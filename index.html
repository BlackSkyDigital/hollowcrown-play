<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hollow Crown</title>
    <link rel="icon" type="image/png" href="./ui/icon.png" />
    <style>
      html, body { margin: 0; height: 100%; overflow: hidden; background: #171310; }
      canvas { display: block; }
      .hint {
        position: fixed; left: 14px; bottom: 12px;
        font: 13px/1.4 system-ui, sans-serif; color: #a3937a;
        user-select: none; pointer-events: none;
      }
      .hint b { color: #e8dcc0; font-weight: 600; }
      .stamina {
        position: fixed; left: 50%; bottom: 80px; transform: translateX(-50%);
        width: 220px; height: 10px; border-radius: 5px;
        background: rgba(21, 16, 11, 0.55);
        box-shadow: 0 0 0 1px rgba(214, 225, 243, 0.22);
        overflow: hidden;
        transition: opacity 0.4s ease 0.5s;
      }
      .stamina.full { opacity: 0; }
      .healthbar {
        position: fixed; left: 50%; bottom: 94px; transform: translateX(-50%);
        width: 220px; height: 10px; border-radius: 5px;
        background: rgba(21, 16, 11, 0.55);
        box-shadow: 0 0 0 1px rgba(214, 225, 243, 0.22);
        overflow: hidden;
        transition: opacity 0.4s ease 0.5s;
      }
      .healthbar.full { opacity: 0; }
      .healthbar-fill {
        width: 100%; height: 100%;
        transform-origin: left center;
        background: #d05252;
      }
      .stamina-fill {
        width: 100%; height: 100%;
        transform-origin: left center;
        background: #7ec96f;
      }
      .stamina-fill.low { background: #d9634d; }
      .resources {
        position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
        display: flex; flex-direction: row; gap: 10px; align-items: center;
      }
      .res {
        display: flex; align-items: center; gap: 8px;
        padding: 7px 14px; border-radius: 8px;
        /* P4-6: painted bronze-and-gold plates behind the ledgers. */
        background: url('./ui/res-plate.jpg') center / 100% 100% no-repeat;
        color: #e8ddc9; font: 600 15px system-ui, sans-serif;
      }
      .res::before {
        content: '';
        width: 14px; height: 14px; border-radius: 3px;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.25);
      }
      .res.wood::before { background: linear-gradient(135deg, #8a5a33, #6b4527); }
      .res.stone::before { background: linear-gradient(135deg, #a7adb8, #7c828c); }
      .res.gold::before { background: linear-gradient(135deg, #e3b341, #b7862c); }
      .res.food::before { background: linear-gradient(135deg, #c74d4d, #8e2f36); }
      .res { position: relative; }
      .res-sub.gain { color: #7fd07a; }
      .res-sub {
        position: absolute; top: calc(100% + 1px); left: 50%;
        transform: translateX(-50%);
        font: 600 10.5px system-ui, sans-serif; color: #c98f7d;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.6); white-space: nowrap;
      }
      .res.popcount::before { background: linear-gradient(135deg, #e8b98a, #c4553d); }
      .res.pop-anim { animation: pop 0.25s ease; }
      .res.has-icon::before { display: none; }
      .res img { width: 20px; height: 20px; }
      .res.pop { animation: pop 0.25s ease; }
      @keyframes pop { 40% { transform: scale(1.18); } }
      .toast {
        position: fixed; left: 50%; bottom: 108px; transform: translateX(-50%);
        padding: 8px 14px; border-radius: 8px;
        background: rgba(21, 16, 11, 0.75);
        color: #f0d9b8; font: 600 14px system-ui, sans-serif;
        opacity: 0; transition: opacity 0.25s; pointer-events: none;
      }
      .toast.show { opacity: 1; }
      .hotbar {
        position: fixed; left: 50%; bottom: 14px; transform: translateX(-50%);
        display: flex; gap: 6px;
      }
      .slot {
        width: 52px; height: 52px; border-radius: 10px; position: relative;
        display: flex; align-items: center; justify-content: center;
        /* P4-6: riveted iron slot frames from the art pass. */
        background: url('./ui/slot-frame.jpg') center / 100% 100% no-repeat;
        cursor: pointer;
      }
      .slot img { width: 44px; height: 44px; }
      .slot .key {
        position: absolute; top: 3px; left: 6px;
        font: 600 10px system-ui, sans-serif; color: #a3937a;
      }
      .slot .badge {
        position: absolute; bottom: 3px; right: 6px;
        font: 700 11px system-ui, sans-serif; color: #e8c986;
      }
      .slot.selected {
        box-shadow: 0 0 0 2px #e8c986;
        filter: brightness(1.4);
      }
      .panel {
        position: fixed; left: 50%; bottom: 152px; transform: translateX(-50%);
        min-width: 320px; padding: 18px 20px;
        /* Generated iron-and-filigree plate: the frame scales, the center
           stays dark for text (border-image slice + fill). */
        border: 22px solid transparent;
        border-image: url('./ui/panel-frame.jpg') 116 fill / 22px stretch;
        box-shadow: 0 14px 40px rgba(0, 0, 0, 0.6);
        color: #e8dcc0; font: 14px system-ui, sans-serif;
        display: none;
      }
      .panel.open { display: block; }
      .panel.choice, .panel.tier, .panel.market {
        left: 50%; top: 45%; transform: translate(-50%, -50%);
        right: auto; bottom: auto; text-align: center; z-index: 30;
      }
      .panel.choice button, .panel.tier button, .panel.market button {
        display: block; width: 100%; margin: 8px 0; padding: 11px 18px;
        border-radius: 10px; border: 0;
        background: url('./ui/button-plate.jpg') center / 100% 100% no-repeat;
        color: #f4e6cc; text-shadow: 0 1px 3px rgba(0, 0, 0, 0.75);
        font: 700 13.5px system-ui, sans-serif; cursor: pointer;
      }
      .panel.choice button:hover:not(:disabled), .panel.tier button:hover:not(:disabled),
      .panel.market button:hover:not(:disabled) { filter: brightness(1.18); }
      .panel.choice button.danger { filter: hue-rotate(-30deg) saturate(1.4) brightness(0.8); }
      /* P6-10: the Codex — the reign's guide-book. Above the main-menu
         overlay (60) so it opens from the title screen. */
      .panel.codex {
        left: 50%; top: 50%; bottom: auto; transform: translate(-50%, -50%);
        width: min(1080px, 94vw); height: min(660px, 88vh);
        z-index: 70; padding: 12px 16px 14px; box-sizing: border-box;
        display: none; flex-direction: column; gap: 8px;
      }
      .panel.codex.open { display: flex; }
      .codex-body { display: flex; gap: 14px; flex: 1; min-height: 0; }
      .codex-list {
        flex: 0 0 250px; overflow-y: auto; display: flex; flex-direction: column;
        gap: 4px; padding-right: 4px;
      }
      .codex-row {
        display: flex; align-items: center; gap: 10px; padding: 5px 8px;
        border: 0; border-radius: 8px; cursor: pointer; text-align: left;
        background: rgba(21, 16, 11, 0.55);
        color: #e8dcc0; font: 600 13px system-ui, sans-serif;
      }
      .codex-row img { width: 40px; height: 40px; }
      .codex-row.selected { box-shadow: 0 0 0 2px #e8c986; background: rgba(52, 41, 28, 0.8); }
      .codex-detail { flex: 1; overflow-y: auto; padding: 6px 12px; text-align: left; }
      .codex-detail img { width: 200px; height: 200px; float: right; margin: 0 0 10px 14px; }
      .codex-detail h4 { margin: 2px 0 8px; font-size: 18px; }
      .codex-detail p { font-size: 14px; line-height: 1.55; color: #e4d5b5; margin: 8px 0; }

      /* P6-9: the tutorial's center stage — every step debuts here big,
         then docks to the corner card once confirmed. */
      .panel.tutorial-stage {
        left: 50%; top: 44%; bottom: auto; transform: translate(-50%, -50%);
        width: min(620px, 92vw); z-index: 45; text-align: left;
      }
      .panel.tutorial-stage h3 { font-size: 20px; margin: 2px 0 10px; }
      .panel.tutorial-stage p { font-size: 14.5px; line-height: 1.55; margin: 9px 0; color: #e4d5b5; }
      .panel.tutorial-stage .tutorial-kicker {
        font: 700 11px system-ui, sans-serif; text-transform: uppercase;
        letter-spacing: 0.14em; color: #c9a34a;
      }
      .panel.tutorial-stage button {
        margin-top: 12px; padding: 10px 26px; border: 0; border-radius: 10px;
        background: url('./ui/button-plate.jpg') center / 100% 100% no-repeat;
        color: #f4e6cc; font: 700 14px system-ui, sans-serif; cursor: pointer;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.75);
      }
      .panel.tutorial-stage button:hover { filter: brightness(1.18); }

      /* P5-6: the raid report card. */
      .raidreport { text-align: left; min-width: 360px; z-index: 28; }
      .raidreport h3 { text-align: center; font-size: 15px; }
      .raidreport-line { margin: 7px 0; font-size: 13.5px; color: #e4d5b5; }
      .panel.tier button:disabled { filter: grayscale(0.85) brightness(0.55); color: #b6ab97; cursor: default; }
      .panel h3 {
        margin: 0 0 4px; font: 700 12.5px Georgia, 'Times New Roman', serif;
        text-transform: uppercase; letter-spacing: 0.14em; color: #c9a34a;
      }
      .panel h3::after {
        content: ''; display: block; height: 12px; margin: 2px auto 6px;
        background: url('./ui/divider.png') center / contain no-repeat;
        mix-blend-mode: screen; opacity: 0.9;
      }
      .mainmenu .sub::after {
        content: ''; display: block; height: 16px; margin: 10px auto 0;
        background: url('./ui/divider.png') center / contain no-repeat;
        mix-blend-mode: screen; opacity: 0.9;
      }
      /* #66: the PC-grade pause/settings panel. */
      .panel.pausepanel {
        left: 50%; top: 50%; bottom: auto; transform: translate(-50%, -50%);
        width: min(860px, 92vw); height: min(600px, 86vh);
        /* P5-14: above the main-menu overlay (60) — Settings opens from
           the title screen now, not just from ESC. */
        z-index: 70; padding: 12px 16px 16px; box-sizing: border-box;
        display: none; flex-direction: column; gap: 10px;
      }
      .panel.pausepanel.open { display: flex; }
      .pause-head { display: flex; align-items: baseline; gap: 12px; }
      .pause-head h3 { margin: 0; font-size: 15px; }
      .pause-head h3::after { display: none; }
      .pause-head .tree-hint { margin-left: auto; }
      .pause-body { display: flex; gap: 16px; flex: 1; min-height: 0; }
      .pause-menu {
        flex: 0 0 300px; display: flex; flex-direction: column; gap: 9px;
        overflow: auto; padding-right: 2px;
      }
      .pause-menu button, .pause-back {
        display: block; width: 100%; padding: 12px 18px; border: 0; border-radius: 10px;
        background: url('./ui/button-plate.jpg') center / 100% 100% no-repeat;
        color: #f4e6cc; text-shadow: 0 1px 3px rgba(0, 0, 0, 0.75);
        font: 700 13.5px system-ui, sans-serif; cursor: pointer; text-align: center;
      }
      .pause-menu button:hover, .pause-back:hover { filter: brightness(1.18); }
      .pause-menu button.danger { filter: hue-rotate(-30deg) saturate(1.4) brightness(0.8); margin-top: auto; }
      .pause-side {
        flex: 1; overflow: auto; background: rgba(15, 12, 8, 0.45);
        border-radius: 10px; padding: 14px 16px;
      }
      .pause-crest {
        display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
        font: 700 16px Georgia, 'Times New Roman', serif; color: #f4e6cc;
      }
      .pause-side .reign-grid { margin: 0; max-width: none; }
      .pause-dev {
        margin-top: 16px; border-top: 1px solid rgba(201, 163, 74, 0.22); padding-top: 10px;
      }
      .pause-dev-head {
        font: 700 10.5px Georgia, serif; text-transform: uppercase;
        letter-spacing: 0.14em; color: #a3937a; margin-bottom: 7px;
      }
      .pause-dev button {
        display: inline-block; margin: 0 8px 6px 0; padding: 7px 12px;
        border: 1px solid rgba(201, 163, 74, 0.4); border-radius: 8px;
        background: rgba(38, 30, 20, 0.85); color: #cbbfa4;
        font: 600 12px system-ui, sans-serif; cursor: pointer;
      }
      .pause-dev button:hover { border-color: #e8c986; color: #f4e6cc; }
      .pause-settings {
        flex: 1; overflow: auto; background: rgba(15, 12, 8, 0.45);
        border-radius: 10px; padding: 10px 16px;
      }
      .pause-settings input[type='range'] { accent-color: #c9a34a; width: 180px; }
      .pause-settings select {
        background: rgba(21, 16, 11, 0.92); color: #f4e6cc;
        border: 1px solid rgba(201, 163, 74, 0.5); border-radius: 6px; padding: 4px 8px;
        font: 12.5px system-ui, sans-serif;
      }
      .pause-back { width: auto; align-self: flex-end; padding: 10px 34px; }

      /* P4-4: the tilde console. */
      .console {
        position: fixed; left: 50%; top: 18%; transform: translateX(-50%);
        width: min(520px, 80vw); z-index: 80; display: none;
        padding: 10px 14px; border-radius: 8px;
        border: 1px solid rgba(201, 163, 74, 0.6); background: rgba(15, 12, 8, 0.95);
        color: #f4e6cc; font: 14px ui-monospace, Consolas, monospace; outline: none;
      }
      .console.open { display: block; }

      /* P4-3: scrollbars in the kingdom's livery, not Windows grey. */
      .panel ::-webkit-scrollbar, .panel::-webkit-scrollbar,
      .tutorial::-webkit-scrollbar, .worldmap ::-webkit-scrollbar {
        width: 10px; height: 10px;
      }
      .panel ::-webkit-scrollbar-track, .panel::-webkit-scrollbar-track {
        background: rgba(15, 12, 8, 0.6); border-radius: 6px;
      }
      .panel ::-webkit-scrollbar-thumb, .panel::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, #8a6a2e, #5d4a20);
        border-radius: 6px; border: 2px solid rgba(15, 12, 8, 0.8);
      }
      .panel ::-webkit-scrollbar-thumb:hover, .panel::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, #c9a34a, #8a6a2e);
      }
      .panel ::-webkit-scrollbar-corner { background: transparent; }
      .panel, .panel * { scrollbar-width: thin; scrollbar-color: #8a6a2e rgba(15, 12, 8, 0.6); }

      /* P3-6: the tutorial card — a walkthrough, not a flash bar. */
      .tutorial {
        position: fixed; right: 12px; top: 64px; z-index: 14;
        width: 312px; padding: 12px 14px; box-sizing: border-box;
        border: 14px solid transparent;
        border-image: url('./ui/panel-frame.jpg') 116 fill / 14px stretch;
        color: #e8dcc0; font: 12.5px system-ui, sans-serif;
      }
      .tutorial-kicker {
        font: 700 10px Georgia, serif; text-transform: uppercase;
        letter-spacing: 0.14em; color: #a3937a; margin-bottom: 3px;
      }
      .tutorial-title {
        font: 700 14.5px Georgia, 'Times New Roman', serif; color: #f4e6cc;
        margin-bottom: 6px;
      }
      .tutorial p { margin: 0 0 7px; line-height: 1.45; }
      .tutorial button {
        display: block; margin-left: auto; padding: 6px 16px; border: 0;
        border-radius: 8px; cursor: pointer;
        background: url('./ui/button-plate.jpg') center / 100% 100% no-repeat;
        color: #f4e6cc; font: 700 12px system-ui, sans-serif;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.75);
      }
      .tutorial button:hover { filter: brightness(1.18); }
      .tutorial-pill {
        position: fixed; right: 12px; top: 64px; z-index: 14; display: none;
        padding: 6px 14px; border: 1px solid rgba(201, 163, 74, 0.45);
        border-radius: 16px; background: rgba(21, 16, 11, 0.8);
        color: #c9a34a; font: 700 11.5px system-ui, sans-serif; cursor: pointer;
      }
      .tutorial-pill:hover { color: #f4e6cc; }

      /* P3-7: the command toolbar — every menu by mouse. */
      .cmdbar {
        position: fixed; right: 176px; bottom: 14px; z-index: 13;
        display: flex; gap: 7px;
      }
      .cmdbar button {
        width: 42px; height: 42px; border: 0; border-radius: 9px; cursor: pointer;
        background: url('./ui/button-plate.jpg') center / 100% 100% no-repeat;
        font-size: 19px; line-height: 1;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.7);
      }
      .cmdbar button:hover { filter: brightness(1.2); }

      /* P2-16: gamepad focus reads clearly on every button. */
      button:focus-visible { outline: 2px solid #e8c986; outline-offset: 1px; }

      /* #G14: larger UI text, one switch. */
      body.text-large .panel, body.text-large .quests-body, body.text-large .toast,
      body.text-large .tree-details, body.text-large .tree-node,
      body.text-large .chatline, body.text-large .tip { font-size: 15px; }
      body.text-large .quest-hint, body.text-large .td-effects { font-size: 14px; }

      /* Photo mode (#G15): one clean frame, no chrome. */
      body.photo .ui, body.photo .panel, body.photo .toast, body.photo .quests,
      body.photo .nametag, body.photo .tip, body.photo .resources,
      body.photo .skydial, body.photo .stamina, body.photo .healthbar,
      body.photo .hotbar, body.photo .minimap, body.photo .perfhud { display: none !important; }

      /* Co-op chat (#G11): a quiet log lower-left, an entry line on Enter. */
      .chatlog {
        position: fixed; left: 10px; bottom: 64px; z-index: 14;
        display: flex; flex-direction: column; gap: 3px; max-width: 380px;
        pointer-events: none;
      }
      .chatline {
        background: rgba(21, 16, 11, 0.72); border-radius: 7px; padding: 4px 9px;
        color: #e8dcc0; font: 12.5px system-ui, sans-serif; line-height: 1.35;
        border: 1px solid rgba(201, 163, 74, 0.25); word-wrap: break-word;
      }
      .chatwho { color: #c9a34a; font-weight: 700; }
      .chatentry {
        position: fixed; left: 10px; bottom: 34px; z-index: 15; width: 360px;
        display: none; padding: 7px 10px; border-radius: 8px;
        border: 1px solid rgba(201, 163, 74, 0.55); background: rgba(21, 16, 11, 0.92);
        color: #f4e6cc; font: 13px system-ui, sans-serif; outline: none;
      }
      .chatentry.open { display: block; }

      /* Save slots wear their kingdom's banner (#G10). */
      .slot-flag {
        display: inline-block; width: 15px; height: 20px; margin-right: 9px;
        border-radius: 2px 2px 3px 3px; vertical-align: -4px;
        color: #c9a34a; font-size: 9px; line-height: 20px; text-align: center;
        box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.35);
      }

      /* The reign ledger on the victory card (#G9). */
      .reign-grid {
        display: grid; grid-template-columns: auto auto; gap: 3px 18px;
        margin: 14px auto 16px; max-width: 430px; text-align: left;
        font: 13px system-ui, sans-serif;
      }
      .reign-k { color: #a3937a; }
      .reign-v { color: #e8c986; font-weight: 700; text-align: right; }

      /* Shared tooltip (#G3): one styled tip for every hover. */
      .tip {
        position: fixed; z-index: 90; max-width: 280px; padding: 7px 10px;
        background: rgba(21, 16, 11, 0.94); border: 1px solid rgba(201, 163, 74, 0.5);
        border-radius: 8px; color: #e8dcc0; font: 12px system-ui, sans-serif;
        line-height: 1.4; white-space: pre-line; pointer-events: none;
        display: none; box-shadow: 0 6px 18px rgba(0, 0, 0, 0.5);
      }
      .tip.show { display: block; }

      /* The campaign tracker (#G2): objectives under the day dial. */
      .quests {
        position: fixed; left: 10px; top: 118px; z-index: 12;
        width: 236px; padding: 8px 10px; box-sizing: border-box;
        background: rgba(21, 16, 11, 0.66); border: 1px solid rgba(201, 163, 74, 0.35);
        border-radius: 10px; color: #e8dcc0; font: 12px system-ui, sans-serif;
      }
      .quests-head {
        font: 700 11px Georgia, 'Times New Roman', serif; text-transform: uppercase;
        letter-spacing: 0.12em; color: #c9a34a; cursor: pointer; user-select: none;
      }
      .quests.collapsed .quests-body { display: none; }
      .quest-row { margin-top: 7px; }
      .quest-title { font-weight: 700; color: #f4e6cc; }
      .quest-hint { margin-top: 2px; color: #a3937a; font-size: 11.5px; line-height: 1.35; }

      /* The TreePanel (#G1): one full-screen frame for Build/Units/Craft. */
      .panel.treepanel {
        left: 50%; top: 50%; bottom: auto; transform: translate(-50%, -50%);
        width: min(1180px, 94vw); height: min(680px, 88vh);
        z-index: 30; padding: 10px 14px 14px; box-sizing: border-box;
        display: none; flex-direction: column;
      }
      .panel.treepanel.open { display: flex; }
      .tree-tabs { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
      .tree-tab {
        padding: 7px 18px; border: 0; border-radius: 8px; cursor: pointer;
        background: url('./ui/button-plate.jpg') center / 100% 100% no-repeat;
        color: #cbbfa4; font: 700 13px Georgia, 'Times New Roman', serif;
        text-transform: uppercase; letter-spacing: 0.1em;
        filter: grayscale(0.5) brightness(0.75);
      }
      .tree-tab:hover { filter: brightness(1.05); }
      .tree-tab.active { color: #f4e6cc; filter: none; box-shadow: 0 0 0 1px #c9a34a; }
      .tree-hint { margin-left: auto; color: #a3937a; font-size: 11.5px; }
      .tree-body { display: flex; gap: 12px; flex: 1; min-height: 0; }
      .tree-graph {
        position: relative; flex: 1; overflow: auto; min-width: 0;
        background: rgba(15, 12, 8, 0.45); border-radius: 10px; padding: 6px;
      }
      .tree-links { position: absolute; left: 0; top: 0; pointer-events: none; }
      .tree-rows { position: relative; display: flex; flex-direction: column; gap: 4px; }
      .tree-row { display: flex; align-items: stretch; gap: 6px; }
      .tree-row + .tree-row { border-top: 1px solid rgba(201, 163, 74, 0.16); padding-top: 4px; }
      .tree-branch-label {
        writing-mode: vertical-rl; transform: rotate(180deg); text-align: center;
        font: 700 11px Georgia, serif; text-transform: uppercase; letter-spacing: 0.12em;
        color: #c9a34a; opacity: 0.85; padding: 4px 0; flex: 0 0 auto;
      }
      .tree-cells { display: grid; gap: 6px 26px; flex: 1; align-items: start; }
      .tree-cell { display: flex; flex-direction: column; gap: 6px; min-height: 10px; }
      .tree-node {
        display: flex; align-items: center; gap: 8px; padding: 5px 8px;
        border: 1px solid rgba(201, 163, 74, 0.35); border-radius: 9px;
        background: rgba(38, 30, 20, 0.85); color: #e8dcc0; cursor: pointer;
        font: 600 12px system-ui, sans-serif; text-align: left;
      }
